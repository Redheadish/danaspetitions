<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>All Petitions</title>
</head>
<body>
<h1>All Petitions</h1>

<a href="/">Home</a> |
<a href="/petitions/new">Create new</a> |
<a href="/petitions/search">Search</a>

<ul>
  <li th:each="petition : ${petitions}">
    <strong th:text="${petition.title}"></strong>
    — <span th:text="${petition.author}"></span>
    <br>
    <span th:text="${petition.description}"></span>
  </li>
</ul>
</body>
</html>
