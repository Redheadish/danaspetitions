<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Petition</title>
</head>
<body>
<h1>Create a Petition</h1>

<a href="/">Home</a> |
<a href="/petitions">View all petitions</a>

<form action="/petitions" method="post">
    <div>
        <label>Title:</label>
        <input type="text" name="title" required>
    </div>
    <br>
    <div>
        <label>Author:</label>
        <input type="text" name="author" required>
    </div>
    <br>
    <div>
        <label>Description:</label><br>
        <textarea name="description" rows="5" cols="40" required></textarea>
    </div>
    <br>
    <button type="submit">Create Petition</button>
</form>
</body>
</html>
